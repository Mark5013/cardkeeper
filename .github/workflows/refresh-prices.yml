name: Refresh PokeTrace prices

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-poketrace-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POKETRACE_API_KEY: ${{ secrets.POKETRACE_API_KEY }}
      POKETRACE_BASE_URL: https://api.poketrace.com/v1
      POKETRACE_REQUEST_DELAY_MS: 250

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh PokeTrace prices
        run: npm run prices:refresh -- --all
