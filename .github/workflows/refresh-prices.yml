name: Refresh TCGCSV prices

on:
  schedule:
    - cron: "17 22 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-tcgcsv-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TCGCSV_USER_AGENT: Cardkeeper/0.1.0 (+https://github.com/Mark5013/cardkeeper)

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh prices when TCGCSV has a newer build
        run: npm run prices:refresh -- --skip-if-current
