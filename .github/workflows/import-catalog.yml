name: Import Pokemon TCG catalog

on:
  schedule:
    - cron: "47 9 * * *"
  workflow_dispatch:

concurrency:
  group: import-pokemon-tcg-catalog
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POKEMON_TCG_API_KEY: ${{ secrets.POKEMON_TCG_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get latest PokemonTCG data commit
        id: upstream
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node -e "const headers = { 'Accept': 'application/vnd.github+json', 'User-Agent': 'Cardkeeper catalog import workflow' }; if (process.env.GITHUB_TOKEN) headers.Authorization = 'Bearer ' + process.env.GITHUB_TOKEN; fetch('https://api.github.com/repos/PokemonTCG/pokemon-tcg-data/commits/master', { headers }).then(async (response) => { if (!response.ok) throw new Error(await response.text()); return response.json(); }).then((commit) => { console.log('sha=' + commit.sha); require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'sha=' + commit.sha + '\n'); });"

      - name: Import new sets and missing cards
        run: npm run catalog:import -- --cards-by-set --missing-only --source-ref=${{ steps.upstream.outputs.sha }} --skip-if-source-ref-current
